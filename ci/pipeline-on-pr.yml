trigger: none # We don't want this to run on pushes

pr:
  - main
  - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  - template: parts/variables.yml
  - template: parts/variables-env--dev.yml
  - template: parts/variables-path.yml

stages:
  - stage: Verify
    jobs:
      - job: TestAndLint
        steps:
          - template: parts/setup-environment.yml
          - template: parts/cache.yml

          - task: Npm@1
            displayName: 'npm ci'
            inputs:
              command: 'ci'

          - template: parts/tests-lint-unit.yml

          - template: parts/tests-e2e.yml
