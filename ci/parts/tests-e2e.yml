steps:
  - task: Cache@2
    displayName: 'Retrieve Cache Playwright browsers'
    inputs:
      key: 'playwright-browsers | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        playwright-browsers | "$(Agent.OS)"
      path: $(PLAYWRIGHT_BROWSERS_PATH)

  - script: |
      npx playwright install --with-deps
    displayName: 'Install Playwright'
    env:
      PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

  - task: Npm@1
    displayName: 'E2E Tests'
    inputs:
      command: 'custom'
      customCommand: 'run test:e2e'
    env:
      CI: 'true'
      PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

  - task: CopyFiles@2
    displayName: 'Copy Files to: $(Build.ArtifactStagingDirectory)'
    condition: failed()
    inputs:
      SourceFolder: 'test-results/'
      Contents: '**'
      TargetFolder: '$(Build.ArtifactStagingDirectory)'

  - task: ArchiveFiles@2
    displayName: 'Zip files'
    condition: failed()
    inputs:
      rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/'
      includeRootFolder: true
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
      replaceExistingArchive: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact: drop'
    condition: failed()
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
      ArtifactName: $(artifactName)
      publishLocation: 'Container'
