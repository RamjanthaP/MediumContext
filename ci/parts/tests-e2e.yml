steps:
  - task: Cache@2
    displayName: 'Retrieve Cache Playwright browsers'
    inputs:
      key: 'playwright-browsers | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        playwright-browsers | "$(Agent.OS)"
      path: $(PLAYWRIGHT_BROWSERS_PATH)

  - script: |
      npx playwright install --with-deps
    displayName: 'Install Playwright'
    env:
      PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

  - task: Npm@1
    displayName: 'E2E Tests'
    inputs:
      command: 'custom'
      customCommand: 'run test:e2e'
    env:
      CI: 'true'
      PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)
